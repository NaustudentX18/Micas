name = "micas-ai-proxy"
main = "cad-ai-proxy.worker.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# KV namespace for rate limiting
# Create it first: wrangler kv:namespace create "RATE_LIMIT"
# Then paste the ID below
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

# Routes — set to your actual domain
# Uncomment and adjust once deployed to Cloudflare Pages
# [routes]
# pattern = "yourdomain.com/api/ai-proxy"
# zone_name = "yourdomain.com"
